    <script>
        document.onreadystatechange = function() {
            var hasRun = false
            var state = document.readyState
            if (state == 'interactive') {
                if (hasRun) {
                    return
                }
                hasRun = true;
                var js = document.createElement("script");
                var head = document.getElementsByTagName("head")[0];
                js.type = "text/javascript";
                js.id = "hsm_element";

                //code to get client id from token
                var hsm_enable_array = globalConstants ? .config ? .hsm_config ? .cug_web;
                var base64Url = token.split('.')[1];
                var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                var decodebase64 = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '=');
                var utf8 = window.atob(decodebase64);
                var decodedToken = decodeURIComponent(Array.from(utf8).map(char => {
                    return '%' + ('00' + char.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                var fyId = JSON.parse(decodedToken).fy_id;

                if (document.getElementById("hsm_element") == null) {
                    if (globalConstants ? .config ? .hsm_config ? .enable_web) {
                        js.src = "./static/js/hsweb/1.5/hslib-1.6.js";
                    } else if (hsm_enable_array.includes(fyId.slice(0, 1))) {
                        js.src = "./static/js/hsweb/1.5/hslib-1.6.js";
                    } else {
                        js.src = "./static/js/hsweb/hslibo.js";
                    }
                }
                head.appendChild(js);
                fyersLoader.startLoader({
                    parentElementID: "tv_chart_container"
                });
            } else if (state == 'complete') {
                //interval in milliseconds (currently 5 min), env = PROD or DEV 
                setTimeout(() => {
                    FyersWidget.notification.callNotificationsOnInterval({
                        env: "PROD",
                        interval: 300000,
                        platform: "WEB"
                    });
                }, 7000)
            }
        }
    </script>
